name: Test - miscellaneous

on:
    workflow_dispatch:
    push:
        branches:
            - "dev"
            - "releases/**"
            - "feature/**"
        tags:
            - "*"
        paths-ignore:
            - ".make.*"
            - "**.md"
            - "examples/**"
            - "**/doc/**"
            - "**/images/**"
            - "**/.gitignore"
            - "**/.dockerignore"
    pull_request:
        branches:
            - "dev"
            - "releases/**"
            - "feature/**"
        paths-ignore:
            - ".make.*"
            - "**.md"
            - "examples/**"
            - "**/doc/**"
            - "**/images/**"
            - "**/.gitignore"
            - "**/.dockerignore"

jobs:
    view_platform:
        runs-on: ubuntu-22.04
        steps:
            - id: platform
              run: |
               python --version
               python -c "import platform; print (platform.uname())"

    check-transform-test-workflows:
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Make sure all transforms have a test workflow
              run: bash scripts/check-workflows.sh
    check-licensing:
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Make repo content includes license headers.
              run: bash scripts/check-licensing.sh
