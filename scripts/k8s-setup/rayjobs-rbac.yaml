    
---
# ray-job-rbac.yaml
# Define a Role that allows read-only access to RayJob resources in the 'default' namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role       
metadata:
  name: rayjobs-reader
rules:
- apiGroups: ["ray.io"]
  resources: ["rayjobs"]
  verbs: ["create", "get", "watch", "list", "update", "patch", "delete"]

---
# Define a RoleBinding to link the 'rayjobs-reader' role to the 'default' service account.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-rayjobs-reader-binding
subjects:
- kind: ServiceAccount
  name: default
roleRef:
  kind: Role
  name: rayjobs-reader
  apiGroup: rbac.authorization.k8s.io