###
# Usage:
# export $(cat .env | xargs)
# envsubst < docling2parquet-pythonjob.yaml | kubectl apply -f -
# Required env. variables:
#
# S3_BUCKET_PATH=bucket-wikimedia-1
# HTML_ZIP=html_zip
# DOCLING_OUTPUT=docling_md
###

apiVersion: batch/v1
kind: Job
metadata:
  name: pythonjob-docling
spec:
  template:
    spec:
      containers:
      - name: docling-container
        image: quay.io/dataprep1/data-prep-kit/docling2parquet-python:latest
        imagePullPolicy: Always
        resources:
          limits:
            cpu: "10" # Allocate 8 CPU cores
          requests:
            cpu: "10" # Request 8 CPU cores
        env:
          - name: DPK_LOG_LEVEL 
            value: DEBUG
          - name: S3_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: s3-secret
                key: s3-key
          - name: S3_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: s3-secret
                key: s3-secret
          - name: S3_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: s3-secret
                key: s3-endpoint
        command: ["python","-m","dpk_docling2parquet.runtime"]
        args:
            - "--data_s3_config"
            - "{'input_folder': '$S3_BUCKET_PATH/$HTML_ZIP', 'output_folder': '$S3_BUCKET_PATH/$DOCLING_OUTPUT'}"
            - "--data_files_to_use"
            - "[ '.zip' ]" 
            - "--data_checkpointing"
            - "False"
            - "--runtime_num_processors"
            - "10"
            - "--data_max_files"
            - "2"
      restartPolicy: Never # Ensure the Job does not restart the container after completion


  
