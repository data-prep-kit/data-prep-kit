apiVersion: ray.io/v1alpha1
kind: RayJob
metadata:
  name: rayjob-1 # Name of your RayCluster
spec:
  rayClusterSpec:
    rayVersion: '2.36.1' # Specify the Ray version
    headGroupSpec:
      # Service type for the head node, can be ClusterIP or NodePort
      serviceType: ClusterIP
      # Ray container image for the head node
      rayStartParams:
        dashboard-host: '0.0.0.0'
      template:
        spec:
          containers:
            - name: ray-head
              env:
                - name: DPK_LOG_LEVEL 
                  value: DEBUG
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_SECRET_KEY
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ENDPOINT
                - name: WORKER_CPU_REQUEST
                  valueFrom:
                    resourceFieldRef:
                      resource: requests.cpu
              image: quay.io/dataprep1/data-prep-kit/docling2parquet-ray:latest
              imagePullPolicy: Always
              ports:
                - containerPort: 6379 # Ray port
                  name: ray-client
                - containerPort: 8265 # Ray Dashboard port
                  name: dashboard
              resources:
                requests:
                  cpu: 2
                  memory: 8Gi
                limits:
                  cpu: 2
                  memory: 8Gi
    workerGroupSpecs:
      - groupName: small-group
        replicas: 10 # Initial number of worker nodes
        minReplicas: 10
        maxReplicas: 10
        rayStartParams: {}
        template:
          spec:
            containers:
              - name: ray-worker
                env:
                  - name: DPK_LOG_LEVEL 
                    value: DEBUG
                  - name: DPK_DPK_DOCLING2PARQUET_TRANSFORM_LOG_LEVEL 
                    value: DEBUG
                  - name: S3_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: s3-secret
                        key: S3_ACCESS_KEY
                  - name: S3_SECRET_KEY
                    valueFrom:
                      secretKeyRef:
                        name: s3-secret
                        key: S3_SECRET_KEY
                  - name: S3_ENDPOINT
                    valueFrom:
                      secretKeyRef:
                        name: s3-secret
                        key: S3_ENDPOINT
                image: quay.io/dataprep1/data-prep-kit/docling2parquet-ray:latest
                imagePullPolicy: Always
                resources:
                  requests:
                    cpu: 1
                    memory: 8Gi
                  limits:
                    cpu: 1
                    memory: 8Gi
  # Job details
  # The command to execute the Python script
  entrypoint: >
    python -m dpk_docling2parquet.ray.transform 
    --run_locally False 
    --data_s3_config "{ 'input_folder' : 'bucket-wikimedia-1/html_zip', 'output_folder' : 'bucket-wikimedia-1/take1' }" 
    --data_files_to_use "[ '.zip' ]" 
    --data_checkpointing False 
    --runtime_creation_delay 3 
    --runtime_num_workers 10
    --runtime_worker_options "{ 'num_cpus': 0.8, 'max_restarts': 0, 'max_task_retries': 0 }" 
  # --runtime_worker_options "{ 'num_cpus': 0.8, 'memory': 3500000000, 'max_restarts': 0, 'max_task_retries': 0 }"
  #  --runtime_worker_options "{ 'num_cpus': 0.8, 'max_restarts': 0 }"
  # submissionMode: "K8sJobMode" # This is the default, but can be specified if needed
  # shutdownAfterJobFinishes: true # Whether to delete the RayCluster after the job finishes