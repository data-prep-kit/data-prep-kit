apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gw-classification-task
spec:
  params:
    - name: S3_BUCKET_PATH
      type: string
    - name: GW_MATH_INPUT
      type: string
    - name: GW_MATH_OUTPUT
      type: string
  workspaces:
    - name: rayjobs
      description: A workspace to mount the job YAML.
  steps:
    - name: run-gw-classification-job
      image: bitnami/kubectl:latest
      script: |
        #!/bin/sh
        git clone -b gw-rayjob --depth 1 https://github.com/touma-I/data-prep-kit-pkg.git /workspace/rayjobs/data-prep-kit
        # Substitute the parameters in the RayJob YAML file and apply it
        #cat /workspace/rayjobs/data-prep-kit/transforms/language/gneissweb_classification/gneissweb_classification-rayjob.yaml
        envsubst < /workspace/rayjobs/data-prep-kit/transforms/language/gneissweb_classification/gneissweb_classification-rayjob.yaml > /workspace/rayjobs/gw-task.yaml
        cat /workspace/rayjobs/gw-task.yaml
        kubectl apply -f /workspace/rayjobs/gw-task.yaml


        