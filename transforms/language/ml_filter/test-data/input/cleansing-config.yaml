default:
    # thresholds based on stats and sampling for European langs without German, Basque
    avg_word_length_min: 3.2
    avg_word_length_max: 7.0

    # thresholds based on stats and sampling for European langs
    alphanumeric_char_ratio_min: 0.77
    alphanumeric_char_ratio_max: 0.86

    # thresholds based on stats and sampling for European langs
    #  control_char_ratio_max: 0.001
    avg_paragraph_length_words_min: 12
    bulletpoint_ratio_max: 0.8
    ellipsis_ratio_max: 0.3
    hashes_word_ratio_max: 0.1
    tabs_word_ratio_max: 0.1
    other_symbol_char_ratio_max: 0.02
    punctuation_char_ratio_min: 0.008
    punctuation_char_ratio_max: 0.08

    dup_paragraphs_ratio_max: 0.25
    dup_paragraphs_char_ratio_max: 0.2

    # thresholds based on mean + 3x stddev over European langs
    dup_5_gram_char_ratio_max: 0.225
    dup_6_gram_char_ratio_max: 0.205
    dup_7_gram_char_ratio_max: 0.190
    dup_8_gram_char_ratio_max: 0.178
    dup_9_gram_char_ratio_max: 0.168
    dup_10_gram_char_ratio_max: 0.160

    # thresholds based on mean + 4x stddev over European langs
    top_2_gram_char_ratio_max: 0.14
    top_3_gram_char_ratio_max: 0.16
    top_4_gram_char_ratio_max: 0.17

en:
    num_words_min: 110
    lid_score_min: 0.5
fr:
    num_words_min: 100
    lid_score_min: 0.6
