###
# Usage:
# export $(cat .env | xargs)
# envsubst < ededup-rayjob.yaml | kubectl apply -f -
###
apiVersion: ray.io/v1alpha1
kind: RayJob
metadata:
  name: rayjob-lance-commit # Name of your RayCluster
spec:
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 10
  rayClusterSpec:
    rayVersion: '2.36.1' # Specify the Ray version
    headGroupSpec:
      # Service type for the head node, can be ClusterIP or NodePort
      serviceType: ClusterIP
      # Ray container image for the head node
      rayStartParams:
        dashboard-host: '0.0.0.0'
      template:
        spec:
          containers:
            - name: ray-head
              env:
                - name: DPK_LOG_LEVEL 
                  value: DEBUG
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: s3-key
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: s3-secret
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: s3-endpoint
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: s3-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: s3-secret
                - name: AWS_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: s3-endpoint      
                - name: HF_HOME
                  value: /tmp/.cache
                - name: WORKER_CPU_REQUEST
                  valueFrom:
                    resourceFieldRef:
                      resource: requests.cpu
              image: quay.io/dataprep1/data-prep-kit/text_encoder-ray:latest
              imagePullPolicy: Always
              ports:
                - containerPort: 6379 # Ray port
                  name: ray-client
                - containerPort: 8265 # Ray Dashboard port
                  name: dashboard
              resources:
                requests:
                  cpu: 4
                  memory: 10Gi
                  ephemeral-storage: 20Gi
                limits:
                  cpu: 4
                  memory: 10Gi
                  ephemeral-storage: 20Gi
  # Job details
  # The command to execute the Python script
  entrypoint: >
    python3 -m dpk_text_encoder.lance_commit
    --lancedb_storage_type '$LANCEDB_STORAGE_TYPE'
    --lancedb_uri "$LANCEDB_URI"
    --lance_dataset_uri "$LANCEDB_DATASET_URI"
    --lancedb_table_name "$LANCEDB_TABLE_NAME"
    --fragments_json_folder "$LANCEDB_FRAGMENTS_JSON_FOLDER"
    --lancedb_table_schema "$LANCEDB_TABLE_SCHEMA_FOLDER"


