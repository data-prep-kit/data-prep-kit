###
# Usage:
# export $(cat .env | xargs)
# envsubst < ededup-rayjob.yaml | kubectl apply -f -
###
apiVersion: ray.io/v1alpha1
kind: RayJob
metadata:
  name: rayjob-lance-commit # Name of your RayCluster
spec:
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 10
  rayClusterSpec:
    rayVersion: '2.36.1' # Specify the Ray version
    headGroupSpec:
      # Service type for the head node, can be ClusterIP or NodePort
      serviceType: ClusterIP
      # Ray container image for the head node
      rayStartParams:
        dashboard-host: '0.0.0.0'
      template:
        spec:
          containers:
            - name: ray-head
              env:
                - name: DPK_LOG_LEVEL 
                  value: DEBUG
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: klwu-cos-east-secrets
                      key: AWS_ACCESS_KEY_ID
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: klwu-cos-east-secrets
                      key: AWS_SECRET_ACCESS_KEY
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: klwu-cos-east-secrets
                      key: AWS_ENDPOINT
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: klwu-huggingface-token
                      key: HF_TOKEN
                - name: HF_HOME
                  value: /tmp/.cache
                - name: WORKER_CPU_REQUEST
                  valueFrom:
                    resourceFieldRef:
                      resource: requests.cpu
              image: us.icr.io/cil15-shared-registry/preprocessing-pipelines/text_encoder-ray:0.2
              imagePullPolicy: Always
              envFrom:
                  - secretRef:
                      name: klwu-cos-east-secrets
              ports:
                - containerPort: 6379 # Ray port
                  name: ray-client
                - containerPort: 8265 # Ray Dashboard port
                  name: dashboard
              resources:
                requests:
                  cpu: 10
                  memory: 160Gi
                  ephemeral-storage: 20Gi
                limits:
                  cpu: 10
                  memory: 160Gi
                  ephemeral-storage: 20Gi
          imagePullSecrets:
              - name: prod-all-icr-io
  # Job details
  # The command to execute the Python script
  entrypoint: >
    python3 -m dpk_text_encoder.lance_commit
    --lancedb_storage_type '$LANCEDB_STORAGE_TYPE'
    --lancedb_uri "$LANCEDB_URI"
    --lance_dataset_uri "$LANCE_DATASET_URI"
    --lancedb_table_name "$LANCEDB_TABLE_NAME"
    --fragments_json_folder "$FRAGMENTS_JSON_FOLDER"
    --lancedb_table_schema "$LANCEDB_TABLE_SCHEMA"


