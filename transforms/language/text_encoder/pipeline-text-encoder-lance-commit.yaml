apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: text-encoder-lance-commit
spec:
  workspaces:
    - name: dpk-pipeline-ws
  params:
    - name: TEXT_ENCODER_LANCEDB_DATA_URI
      type: string
    - name: TEXT_ENCODER_FRAGMENT_JSON_FOLDER
      type: string
    - name: TEXT_ENCODER_DATASET_NAME
      type: string
    - name: TEXT_ENCODER_MODEL_NAME
      type: string
      default: "ibm-granite/granite-embedding-30m-english"
    - name: TEXT_ENCODER_INPUT_FOLDER
      type: string
    - name: TEXT_ENCODER_OUTPUT_FOLDER
      type: string
    - name: TEXT_ENCODER_CONTENTS_NAME
      type: string
      default: "contents"
    - name: TEXT_ENCODER_DOCUMENT_ID_NAME
      type: string
      default: "document_id"
    - name: RUNTIME_NUM_WORKERS
      type: string
      default: "10"
    - name: LANCEDB_STORAGE_TYPE
      type: string
    - name: LANCEDB_URI
      type: string
    - name: LANCE_DATASET_URI
      type: string
    - name: LANCEDB_TABLE_NAME
      type: string
    - name: FRAGMENTS_JSON_FOLDER
      type: string
    - name: LANCEDB_TABLE_SCHEMA
      type: string
  tasks:
    - name: execute-repo-task
      taskRef:
        name: repo
      workspaces:
        - name: rayjobs
          workspace: dpk-pipeline-ws
    - name: execute-text-encoder-task
      taskRef:
        name: text-encoder
      runAfter:
        - execute-repo-task
      workspaces:
        - name: rayjobs
          workspace: dpk-pipeline-ws
      params:
        - name: TEXT_ENCODER_LANCEDB_DATA_URI
          value: $(params.TEXT_ENCODER_LANCEDB_DATA_URI)
        - name: TEXT_ENCODER_FRAGMENT_JSON_FOLDER
          value: $(params.TEXT_ENCODER_FRAGMENT_JSON_FOLDER)
        - name: TEXT_ENCODER_DATASET_NAME
          value: $(params.TEXT_ENCODER_DATASET_NAME)
        - name: TEXT_ENCODER_MODEL_NAME
          value: $(params.TEXT_ENCODER_MODEL_NAME)
        - name: TEXT_ENCODER_INPUT_FOLDER
          value: $(params.TEXT_ENCODER_INPUT_FOLDER)
        - name: TEXT_ENCODER_OUTPUT_FOLDER
          value: $(params.TEXT_ENCODER_OUTPUT_FOLDER)
        - name: TEXT_ENCODER_CONTENTS_NAME
          value: $(params.TEXT_ENCODER_CONTENTS_NAME)
        - name: TEXT_ENCODER_DOCUMENT_ID_NAME
          value: $(params.TEXT_ENCODER_DOCUMENT_ID_NAME)
        - name: RUNTIME_NUM_WORKERS
          value: $(params.RUNTIME_NUM_WORKERS)
    - name: execute-lance-commit-task
      taskRef:
        name: lance-commit
      runAfter:
        - execute-text-encoder-task
      workspaces:
        - name: rayjobs
          workspace: dpk-pipeline-ws
      params:
        - name: LANCEDB_STORAGE_TYPE
          value: $(params.LANCEDB_STORAGE_TYPE)
        - name: LANCEDB_URI
          value: $(params.LANCEDB_URI)
        - name: LANCE_DATASET_URI
          value: $(params.LANCE_DATASET_URI)
        - name: LANCEDB_TABLE_NAME
          value: $(params.LANCEDB_TABLE_NAME)
        - name: FRAGMENTS_JSON_FOLDER
          value: $(params.FRAGMENTS_JSON_FOLDER)
        - name: LANCEDB_TABLE_SCHEMA
          value: $(params.LANCEDB_TABLE_SCHEMA)

   
