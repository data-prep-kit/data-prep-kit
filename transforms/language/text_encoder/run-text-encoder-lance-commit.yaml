# Specify user prefix (UP) and run prefix (RP) before applying the pipeline run
# UP=MT RP=`date +"%m%d%H"` envsubst < run-gwclassification.yaml | kubectl apply -f -

apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: text-encoder-lance-commit
spec:
  pipelineRef:
    name: text-encoder-lance-commit
  timeouts:
    pipeline: "24h"  # Set to 0 to disable timeout
  params:
      - name: TEXT_ENCODER_LANCEDB_DATA_URI
        value: "s3://cos-optimal-llm-pile/bluepile-processing/rel_10/embeddings/tekton_tests/lance/tekton_tests.db/tekton_tests.lance/"
      - name: TEXT_ENCODER_FRAGMENT_JSON_FOLDER
        value: "cos-optimal-llm-pile/bluepile-processing/rel_10/embeddings/tekton_tests/lance/tekton_tests_fragments_json/"
      - name: TEXT_ENCODER_DATASET_NAME
        value: "tekton_tests"
      - name: TEXT_ENCODER_MODEL_NAME
        value: "ibm-granite/granite-embedding-30m-english"
      - name: TEXT_ENCODER_INPUT_FOLDER
        value: "cos-optimal-llm-pile/bluepile-processing/rel_10/embeddings/tekton_tests/input_parquets/"
      - name: TEXT_ENCODER_OUTPUT_FOLDER
        value: "cos-optimal-llm-pile/bluepile-processing/rel_10/embeddings/tekton_tests/input_parquets_tmp4embeddings/"
      - name: TEXT_ENCODER_CONTENTS_NAME
        value: "contents"
      - name: TEXT_ENCODER_DOCUMENT_ID_NAME
        value: "document_id"
      - name: RUNTIME_NUM_WORKERS
        value: "1"
  workspaces:
      - name: dpk-pipeline-ws
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
