apiVersion: ray.io/v1alpha1
kind: RayJob
metadata:
  name: rayjob-tkn # Name of your RayCluster
spec:
  rayClusterSpec:
    rayVersion: '2.36.1' # Specify the Ray version
    headGroupSpec:
      # Service type for the head node, can be ClusterIP or NodePort
      serviceType: ClusterIP
      # Ray container image for the head node
      rayStartParams:
        dashboard-host: '0.0.0.0'
      template:
        spec:
#          imagePullSecrets:
#            - name: prod-all-icr-io # Replace with the name of your created secret
          containers:
            - name: ray-head
              env:
                - name: DPK_LOG_LEVEL 
                  value: DEBUG
                - name: DPK_DPK_DOCLING2PARQUET_TRANSFORM_LOG_LEVEL 
                  value: INFO
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_SECRET_KEY
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: s3-secret
                      key: S3_ENDPOINT
                - name: WORKER_CPU_REQUEST
                  valueFrom:
                    resourceFieldRef:
                      resource: requests.cpu
              image: quay.io/dataprep1/data-prep-kit/tokenization2arrow-ray:latest
              imagePullPolicy: Always
              ports:
                - containerPort: 6379 # Ray port
                  name: ray-client
                - containerPort: 8265 # Ray Dashboard port
                  name: dashboard
              resources:
                requests:
                  cpu: 2
                  memory: 32Gi
                limits:
                  cpu: 2
                  memory: 32Gi
    workerGroupSpecs:
      - groupName: small-group
        replicas: 1 # Initial number of worker nodes
        minReplicas: 1
        maxReplicas: 5
        rayStartParams: {}
        template:
          spec:
#            imagePullSecrets:
#              - name: prod-all-icr-io # Replace with the name of your created secret
            containers:
              - name: ray-worker
                env:
                  - name: DPK_LOG_LEVEL 
                    value: DEBUG
                  - name: DPK_DPK_DOCLING2PARQUET_TRANSFORM_LOG_LEVEL 
                    value: DEBUG
                  - name: S3_ACCESS_KEY
                    valueFrom:
                      secretKeyRef:
                        name: s3-secret
                        key: S3_ACCESS_KEY
                  - name: S3_SECRET_KEY
                    valueFrom:
                      secretKeyRef:
                        name: s3-secret
                        key: S3_SECRET_KEY
                  - name: S3_ENDPOINT
                    valueFrom:
                      secretKeyRef:
                        name: s3-secret
                        key: S3_ENDPOINT
                image: quay.io/dataprep1/data-prep-kit/tokenization2arrow-ray:latest
                imagePullPolicy: Always
                resources:
                  requests:
                    cpu: 1
                    memory: 32Gi
                  limits:
                    cpu: 1
                    memory: 32Gi
  # Job details
  # The command to execute the Python script
  entrypoint: >
    python -m dpk_tokenization2arrow.ray.runtime 
    --tkn_tokenizer s3://bucket-wikimedia-1/granite-4.0-tiktoken-r250219a/
    --tkn_doc_content_column contents
    --tkn_doc_id_column document_id
    --tkn_chunk_size 2000
    --tkn_tokenizer_args cache_dir=/root/ray/.cache/tkn
    --run_locally False
    --data_s3_config "{ 'input_folder' : 'bucket-wikimedia-1/take6_md', 'output_folder' : 'bucket-wikimedia-1/tknarrow_2' }" 
    --data_files_to_use "[ '.parquet' ]" 
    --data_checkpointing False 
    --runtime_creation_delay 3 
    --runtime_num_workers 1
    --runtime_worker_options "{ 'num_cpus': 0.8, 'max_restarts': 0, 'max_task_retries': 0 }" 

